name: gamingwalpaper
description: A gaming wallpaper Flutter app.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  file_picker: ^10.3.2
  dio: ^5.8.0
  google_sign_in: ^6.2.1
  path_provider: ^2.1.5
  gal: ^2.3.0
  permission_handler: ^11.3.0
  wallpaper_manager_flutter: ^1.0.1
  shared_preferences: ^2.5.3
  share_plus: ^10.1.4

  firebase_core: ^3.13.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.12
  google_mobile_ads: ^5.3.1
  video_player: ^2.10.0
  just_audio: ^0.9.40

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.0


flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo.png"
flutter_native_splash:
  color: "#000000"
  image: assets/logo.png

  android: true
  ios: false
flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/google.png
